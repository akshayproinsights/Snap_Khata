<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SnapKhata — Processing Order</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#f8f9fa",
                        "secondary": "#006c49",
                        "on-secondary-fixed-variant": "#005236",
                        "background": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "surface-bright": "#f8f9fa",
                        "outline": "#727785",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "primary-container": "#2170e4",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#424754",
                        "on-secondary-fixed": "#002113",
                        "surface-container-highest": "#e1e3e4",
                        "primary-fixed": "#d8e2ff",
                        "on-secondary-container": "#00714d",
                        "on-background": "#191c1d",
                        "surface-container-low": "#f3f4f5",
                        "primary-fixed-dim": "#adc6ff",
                        "error": "#ba1a1a",
                        "surface-container": "#edeeef",
                        "on-primary-container": "#fefcff",
                        "inverse-primary": "#adc6ff",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#4edea3",
                        "on-surface": "#191c1d",
                        "tertiary": "#825100",
                        "on-primary": "#ffffff",
                        "outline-variant": "#c2c6d6",
                        "inverse-on-surface": "#f0f1f2",
                        "tertiary-container": "#a36700",
                        "primary": "#0058be",
                        "surface-tint": "#005ac2",
                        "on-primary-fixed": "#001a42",
                        "inverse-surface": "#2e3132",
                        "secondary-container": "#6cf8bb",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary-fixed": "#ffddb8",
                        "on-primary-fixed-variant": "#004395",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary-fixed": "#2a1700"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .rotating-border {
            border: 2px dashed #0058be;
            border-radius: 50%;
            animation: spin 8s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#f8f9fa] dark:bg-slate-950 flex items-center justify-between px-6 py-4 w-full docked full-width top-0 sticky z-50">
<div class="flex items-center gap-4">
<button class="text-[#0058be] dark:text-blue-400 hover:bg-[#edeeef] dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-bold text-[#0058be] dark:text-blue-400 font-['Inter'] tracking-tight">SnapKhata</h1>
</div>
<div class="flex items-center gap-3">
<button class="text-[#424754] hover:bg-[#edeeef] dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center px-6 pt-8 pb-12 max-w-md mx-auto w-full">
<!-- Processing Visual -->
<div class="relative w-44 h-44 flex items-center justify-center mb-10">
<!-- Rotating dashed rings -->
<div class="absolute inset-0 rotating-border opacity-20"></div>
<div class="absolute inset-4 rotating-border opacity-40" style="animation-direction: reverse; animation-duration: 12s;"></div>
<!-- Central Icon -->
<div class="relative w-24 h-24 bg-gradient-to-br from-primary to-primary-container rounded-full flex items-center justify-center shadow-[0px_12px_32px_rgba(0,88,190,0.25)]">
<span class="material-symbols-outlined text-white text-4xl" data-icon="description" style="font-variation-settings: 'FILL' 1;">description</span>
</div>
</div>
<!-- Status Text -->
<div class="text-center mb-10">
<h2 class="text-3xl font-extrabold tracking-tight mb-2">Checking prices</h2>
<p class="text-on-surface-variant font-medium text-sm">Matching rates and quantities</p>
</div>
<!-- Progress Card Group -->
<div class="w-full bg-surface-container-lowest rounded-2xl p-6 shadow-[0px_8px_24px_rgba(0,0,0,0.04)] border border-surface-container mb-8">
<div class="flex items-center justify-between mb-4">
<span class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">Step 3 of 6</span>
<span class="text-xs font-black text-primary">50%</span>
</div>
<!-- Progress Bar -->
<div class="h-2 w-full bg-surface-container rounded-full overflow-hidden mb-8">
<div class="h-full bg-primary rounded-full transition-all duration-500 ease-out" style="width: 50%;"></div>
</div>
<!-- Phase Indicators -->
<div class="space-y-5">
<!-- Uploading (Done) -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-7 h-7 rounded-full bg-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[18px]" data-icon="check">check</span>
</div>
<span class="text-on-surface-variant font-semibold">Uploading document</span>
</div>
<span class="text-secondary text-[10px] font-black uppercase tracking-widest">Done</span>
</div>
<!-- Reading (Active) -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-7 h-7 rounded-full bg-primary/10 flex items-center justify-center relative">
<div class="w-4 h-4 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
</div>
<span class="text-on-surface font-bold">Reading details &amp; prices</span>
</div>
<span class="text-primary text-[10px] font-black animate-pulse uppercase tracking-widest">Reading</span>
</div>
</div>
</div>
<!-- Go Home Action Card -->
<button class="w-full mb-10 group">
<div class="active:scale-[0.98] transition-all duration-200 rounded-2xl p-5 flex items-center justify-between bg-blue-50 hover:bg-blue-100/50 border border-blue-100">
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 rounded-xl bg-white shadow-sm flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="home">home</span>
</div>
<div>
<p class="font-bold text-on-surface">Go to Home</p>
<p class="text-xs text-on-surface-variant">Keep working while we process</p>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Bottom Tip Card -->
<div class="bg-surface-container-low rounded-2xl p-6 flex gap-4 items-start w-full">
<div class="bg-white p-2 rounded-lg shadow-sm shrink-0">
<span class="material-symbols-outlined text-tertiary" data-icon="lightbulb">lightbulb</span>
</div>
<div>
<p class="text-sm font-semibold mb-1">Quick Tip</p>
<p class="text-xs text-on-surface-variant leading-relaxed">Ensure the document is well-lit for faster processing and high accuracy reading.</p>
</div>
</div>
</main>
</body></html>
