# Nginx virtual host for mydigientry.com
# Place this file at: /etc/nginx/sites-available/mydigientry.com
# Then: sudo ln -s /etc/nginx/sites-available/mydigientry.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    server_name snapkhata.com www.snapkhata.com api.snapkhata.com mydigientry.com www.mydigientry.com;

    client_max_body_size 50M; # Allow large image uploads

    # ── API → FastAPI (port 8000) ─────────────────────────────────────────────
    # All /api/* requests are forwarded to the Python backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Support Server-Sent Events (used by sync-finish/stream)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── PWA Update Logic ──────────────────────────────────────────────────────
    # Disable caching for the service worker and index.html to force updates
    location ~* (flutter_service_worker\.js|index\.html)$ {
        root /root/Snap_Khata/mobile/build/web;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # ── Flutter Web App ───────────────────────────────────────────────────────
    location / {
        root /root/Snap_Khata/mobile/build/web;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/snapkhata.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/snapkhata.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = api.snapkhata.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = www.snapkhata.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = snapkhata.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 default_server;
    listen [::]:80 default_server;
    server_name snapkhata.com www.snapkhata.com api.snapkhata.com mydigientry.com www.mydigientry.com;
    return 404; # managed by Certbot
}
