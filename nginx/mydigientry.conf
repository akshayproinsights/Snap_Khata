# Nginx virtual host for mydigientry.com
# Place this file at: /etc/nginx/sites-available/mydigientry.com
# Then: sudo ln -s /etc/nginx/sites-available/mydigientry.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name mydigientry.com www.mydigientry.com;

    # ── API → FastAPI (port 8000) ─────────────────────────────────────────────
    # All /api/* requests are forwarded to the Python backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Support Server-Sent Events (used by sync-finish/stream)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # ── React Web App (port 5000) ─────────────────────────────────────────────
    # Everything else is served by the React frontend (includes receipt.html)
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SPA fallback — let the frontend handle 404s (React Router)
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://127.0.0.1:5000;
    }
}

# ── HTTPS (add after running certbot) ────────────────────────────────────────
# sudo apt install certbot python3-certbot-nginx
# sudo certbot --nginx -d mydigientry.com -d www.mydigientry.com
