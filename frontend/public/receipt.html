<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <!-- Force desktop view on mobile (CamScanner style) -->
    <meta name="viewport" content="width=850" />
    <title id="pageTitle">Order Summary • SnapKhata</title>

    <!-- Open Graph -->
    <meta property="og:title" id="ogTitle" content="Order Summary • SnapKhata" />
    <meta property="og:description" content="View your complete order details and receipt." />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg: #eceff1;
            --white: #ffffff;
            --border: #cccccc;
            --border-strong: #000000;
            --text-primary: #000000;
            --text-secondary: #333333;
            --text-muted: #555555;
            --accent: #000000;
            --accent-dark: #000000;
            --accent-light: #f5f5f5;
            --green: #000000;
            --green-bg: #ffffff;
            --green-border: #cccccc;
            --amber: #000000;
            --amber-bg: #ffffff;
            --amber-border: #cccccc;
            --red: #000000;
            --invoice-bg: #ffffff;
            --invoice-border: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* ── Loader ── */
        .loader-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: var(--bg);
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
        }

        .loader-sub {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ── Error ── */
        .error-wrap {
            min-height: 100vh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .error-icon {
            font-size: 52px;
            margin-bottom: 16px;
        }

        .error-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--red);
            margin-bottom: 8px;
        }

        .error-desc {
            color: var(--text-secondary);
            max-width: 380px;
            margin-bottom: 24px;
        }

        .btn-retry {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        /* ── Content wrapper ── */
        #content-wrap {
            display: none;
            width: 100%;
            overflow-x: hidden;
        }
 
        
        /* ── Desktop Container ── */
        .scaled-container {
            width: 850px;
            margin: 0 auto;
            padding: 40px 0 80px;
            display: flex;
            justify-content: center;
        }

        /* ─────────────────────────────────────────────────────
           TABULAR DOCUMENT STYLES
        ───────────────────────────────────────────────────── */
        .inv-page {
            width: 100%;
            margin: 0 auto;
            color: var(--text-primary);
        }

        .inv-doc-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #334155;
        }

        .inv-doc {
            background: #fff;
            border: 1px solid var(--border-strong);
            width: 100%;
            margin-bottom: 24px;
        }

        .inv-header-grid {
            display: grid;
            grid-template-columns: 1fr;
            border-bottom: 1px solid var(--border-strong);
        }

        .inv-shop-info {
            padding: 16px;
            border-bottom: 1px solid var(--border-strong);
        }

        .inv-shop-name {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .inv-shop-detail, .inv-gst-number {
            font-size: 13px;
            color: #334155;
        }

        .inv-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .inv-bill-to {
            padding: 12px 16px;
            border-right: 1px solid var(--border-strong);
        }

        .inv-invoice-details {
            padding: 12px 16px;
        }

        .inv-col-label {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .inv-col-val {
            font-size: 13px;
            color: #334155;
            line-height: 1.5;
        }

        .inv-col-val strong {
            font-weight: 600;
            color: #1e293b;
        }

        .inv-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            border-bottom: 1px solid var(--border-strong);
        }

        .inv-table th {
            padding: 8px;
            font-weight: 700;
            color: #1e293b;
            border-bottom: 1px solid var(--border-strong);
            border-right: 1px solid var(--border-strong);
            text-align: left;
        }

        .inv-table th:last-child {
            border-right: none;
        }

        .inv-table td {
            padding: 8px;
            color: #334155;
            border-right: 1px solid var(--border-strong);
            vertical-align: top;
        }

        .inv-table td:last-child {
            border-right: none;
        }

        .inv-table .right { text-align: right; }
        .inv-table .center { text-align: center; }

        .inv-summary-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            border-bottom: 1px solid var(--border-strong);
        }

        .inv-empty-left {
            padding: 12px 16px;
            border-right: 1px solid var(--border-strong);
        }

        .inv-totals-wrap {
            padding: 0;
            border-left: 1px solid var(--border-strong);
        }

        .inv-totals-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .inv-totals-table td {
            padding: 6px 12px;
            color: #334155;
            border-bottom: 1px solid var(--border-strong);
        }

        .inv-totals-table tr:last-child td {
            border-bottom: none; /* Let the container border handle it */
        }

        .inv-totals-table td.label-col {
            border-right: 1px solid var(--border-strong);
            font-weight: 600;
            width: 55%;
        }
        
        .inv-totals-table td.amount-col {
            text-align: right;
            font-weight: 600;
            color: #1e293b;
            width: 45%;
        }

        /* Amount in Words row: keep middle divider visible */
        .inv-totals-table tr.words-row td {
            border-bottom: none;
            padding: 10px 12px;
        }
        
        .inv-amount-words-title {
            font-weight: 600;
            color: #1e293b;
        }

        .inv-amount-words {
            color: #334155;
            margin-top: 4px;
        }

        .inv-terms {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-strong);
            font-size: 13px;
            color: #334155;
        }

        .inv-terms-title {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .inv-footer-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
        }

        .inv-footer-left {
            padding: 16px;
            border-right: 1px solid var(--border-strong);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .inv-footer-note {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .inv-footer-brand {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .inv-footer-brand span { color: var(--accent); }

        .inv-sign-block {
            padding: 16px;
            padding-top: 64px; /* Space for signature */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .inv-sign-line {
            width: 160px;
            height: 1px;
            background: var(--text-muted);
            margin: 0 0 8px 0;
        }

        .inv-sign-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ── FAB Print ── */
        .fab-print {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 50;
        }

        .fab-print button {
            border: none;
            padding: 14px 26px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(79, 70, 229, 0.4);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .fab-print button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.5);
        }

        @media print {
            body {
                background: #fff;
            }

            .os-page,
            .inv-page {
                padding: 0;
                max-width: 100%;
            }

            .os-card,
            .inv-doc,
            .premium-card {
                box-shadow: none;
                border: none;
                margin: 0;
            }
            .scaled-viewport {
                display: block;
            }
            .scaled-content {
                transform: none !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            .fab-print {
                display: none;
            }
        }

        /* Removed media max-width 640px to enable proper scaled preview */
    </style>
</head>

<body>
    <!-- Loader -->
    <div id="loader" class="loader-wrap">
        <div class="spinner"></div>
        <div class="loader-text">Loading details…</div>
        <div class="loader-sub">Fetching your receipt securely</div>
    </div>

    <!-- Error -->
    <div id="error-screen" class="error-wrap">
        <div class="error-icon">⚠️</div>
        <h2 class="error-title" id="error-title">Receipt Not Found</h2>
        <p class="error-desc" id="error-message">The receipt link is invalid or data is unavailable.</p>
        <button class="btn-retry" onclick="window.location.reload()">Try Again</button>
    </div>

    <!-- Main content (injected by JS) -->
    <div id="content-wrap"></div>

    <!-- FAB -->
    <div class="fab-print" id="fabPrint" style="display:none;">
        <button type="button" onclick="window.print()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 6 2 18 2 18 9" />
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                <rect x="6" y="14" width="12" height="8" />
            </svg>
            Download / Print
        </button>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8000'
            : 'https://api.snapkhata.com';

        // ── helpers ──────────────────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const hide = id => { const el = $(id); if (el) el.style.display = 'none'; };
        const show = id => { const el = $(id); if (el) el.style.display = 'block'; };

        const fmtMoney = v => '₹ ' + Number(v || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const fmtQty = v => Number(v || 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const fmtDate = raw => {
            if (!raw) return '—';
            try {
                let d;
                if (/^\d{2}-\d{2}-\d{4}$/.test(raw)) {
                    const [dd, mm, yyyy] = raw.split('-');
                    d = new Date(`${yyyy}-${mm}-${dd}`);
                } else {
                    d = new Date(raw);
                }
                if (isNaN(d)) return raw;
                return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
            } catch { return raw; }
        };

        function showError(title, msg) {
            hide('loader');
            const el = $('error-screen');
            if (el) { el.style.display = 'flex'; }
            if (title) $('error-title').textContent = title;
            if (msg) $('error-message').textContent = msg;
        }

        function numberToWords(n) {
            const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten', 'Eleven', 'Twelve',
                'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
            const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            if (n === 0) return 'Zero';
            function below1000(num) {
                if (num < 20) return ones[num];
                if (num < 100) return tens[Math.floor(num / 10)] + (num % 10 ? ' ' + ones[num % 10] : '');
                return ones[Math.floor(num / 100)] + ' Hundred' + (num % 100 ? ' ' + below1000(num % 100) : '');
            }
            let result = '';
            const crore = Math.floor(n / 10000000); n %= 10000000;
            const lakh = Math.floor(n / 100000); n %= 100000;
            const thousand = Math.floor(n / 1000); n %= 1000;
            const rest = n;
            if (crore) result += below1000(crore) + ' Crore ';
            if (lakh) result += below1000(lakh) + ' Lakh ';
            if (thousand) result += below1000(thousand) + ' Thousand ';
            if (rest) result += below1000(rest);
            return result.trim();
        }

        // ── main ─────────────────────────────────────────────────────────────
        async function fetchAndRender() {
            const params = new URLSearchParams(window.location.search);
            
            // Support 'i' or 'id' for orderId
            let orderId = params.get('i') || params.get('id');
            if (!orderId) {
                const m = window.location.search.match(/[?&](?:id|i)(?:=|%3D)([^&]+)/i);
                if (m) orderId = decodeURIComponent(m[1]);
            }
            if (!orderId) { showError('Invalid Link', 'No receipt ID found in URL.'); return; }

            const uParam = params.get('u'); // username

            try {
                let apiUrl = `${API_BASE}/api/public/receipts/${orderId}`;
                if (uParam) {
                    apiUrl += `?u=${encodeURIComponent(uParam)}`;
                }
                const resp = await fetch(apiUrl);
                if (!resp.ok) throw new Error(resp.status === 404 ? 'not_found' : 'server_error');
                const data = await resp.json();

                // Support 'g' or 'gst_mode' - prioritize backend but allow URL override for backward compatibility
                let gstMode = data.gst_mode && data.gst_mode !== 'none' ? data.gst_mode : 'none';
                if (params.has('g')) gstMode = params.get('g');
                else if (params.has('gst_mode')) gstMode = params.get('gst_mode');

                // Support 'p' or 'pm' for payment_mode
                if (params.has('p')) data.payment_mode = params.get('p');
                else if (params.has('pm')) data.payment_mode = params.get('pm');

                // Support 'r' or 'ra' for received_amount
                if (params.has('r')) data.received_amount = Number(params.get('r'));
                else if (params.has('ra')) data.received_amount = Number(params.get('ra'));

                // Support 'b' or 'bd' for balance_due
                if (params.has('b')) data.balance_due = Number(params.get('b'));
                else if (params.has('bd')) data.balance_due = Number(params.get('bd'));

                if (gstMode === 'none') {
                    renderOrderSummary(data);
                } else {
                    renderGstInvoice(data, gstMode);
                }
            } catch (err) {
                if (err.message === 'not_found') showError('Receipt Not Found', 'We could not locate this receipt.');
                else showError('Unable to Load', 'Please check your connection and try again.');
            }
        }

        // ─────────────────────────────────────────────────────────────────────
        // ORDER SUMMARY renderer
        // ─────────────────────────────────────────────────────────────────────
        function renderOrderSummary(data) {
            document.title = `Order Summary #${data.id || '—'} • SnapKhata`;

            const items = Array.isArray(data.items) ? data.items : [];
            const isPaid = data.status === 'PAID';
            const isAutomobile = data.industry === 'automobile';

            const taxableItems = items.filter(i => {
                const t = String(i.type || '').toLowerCase();
                return t !== 'labor' && t !== 'labour' && t !== 'service';
            });
            const nonTaxableItems = items.filter(i => {
                const t = String(i.type || '').toLowerCase();
                return t === 'labor' || t === 'labour' || t === 'service';
            });

            const partsSubtotal = taxableItems.reduce((s, i) => s + Number(i.amount || 0), 0);
            const laborSubtotal = nonTaxableItems.reduce((s, i) => s + Number(i.amount || 0), 0);
            const subtotal = partsSubtotal + laborSubtotal;
            // Always dynamically calculate total from items if they exist to ensure mathematical consistency
            const grandTotal = items.length > 0 ? subtotal : (Number(data.total_amount) || subtotal);

            const receivedAmount = (data.received_amount !== undefined && data.received_amount !== null) ? Number(data.received_amount) : null;
            const balanceDue = receivedAmount !== null ? Math.max(0, grandTotal - receivedAmount) : (data.balance_due !== undefined && data.balance_due !== null ? Number(data.balance_due) : null);

            let displayStatus = data.status || 'UNPAID';
            if (receivedAmount !== null) {
                if (receivedAmount >= grandTotal) displayStatus = 'PAID';
                else if (receivedAmount > 0) displayStatus = 'PARTIAL';
                else displayStatus = 'UNPAID';
            } else if (balanceDue !== null) {
                if (balanceDue <= 0) displayStatus = 'PAID';
                else if (balanceDue < grandTotal) displayStatus = 'PARTIAL';
                else displayStatus = 'UNPAID';
            }
            displayStatus = displayStatus.toUpperCase();

            let itemsHtml = '';
            
            if (isAutomobile) {
                if (taxableItems.length > 0) {
                    itemsHtml += `<tr style="background:#f8fafc;"><td colspan="5" style="font-weight:700;padding:8px;border-bottom:1px solid var(--border-strong);color:#1e293b;text-transform:uppercase;font-size:12px;letter-spacing:0.5px;">Spare Parts & Consumables Section</td></tr>`;
                    taxableItems.forEach((item, idx) => {
                        const qty = Number(item.qty || 1);
                        const rate = Number(item.rate || 0);
                        const amount = Number(item.amount || 0);
                        itemsHtml += `
                        <tr>
                            <td class="center">${idx + 1}</td>
                            <td>${item.name || 'Spare Part'}</td>
                            <td class="center">${fmtQty(qty)}</td>
                            <td class="right">${fmtMoney(rate > 0 ? rate : amount / qty)}</td>
                            <td class="right">${fmtMoney(amount)}</td>
                        </tr>`;
                    });
                }

                if (nonTaxableItems.length > 0) {
                    itemsHtml += `<tr style="background:#f8fafc;"><td colspan="5" style="font-weight:700;padding:8px;border-bottom:1px solid var(--border-strong);color:#1e293b;text-transform:uppercase;font-size:12px;letter-spacing:0.5px;">Labor & Services Section</td></tr>`;
                    nonTaxableItems.forEach((item, idx) => {
                        const qty = Number(item.qty || 1);
                        const rate = Number(item.rate || 0);
                        const amount = Number(item.amount || 0);
                        itemsHtml += `
                        <tr>
                            <td class="center">${taxableItems.length + idx + 1}</td>
                            <td>${item.name || 'Servicing'}</td>
                            <td class="center">${fmtQty(qty)}</td>
                            <td class="right">${fmtMoney(rate > 0 ? rate : amount / qty)}</td>
                            <td class="right">${fmtMoney(amount)}</td>
                        </tr>`;
                    });
                }
            } else {
                items.forEach((item, idx) => {
                    const qty = Number(item.qty || 1);
                    const rate = Number(item.rate || 0);
                    const amount = Number(item.amount || 0);
                    itemsHtml += `
                    <tr>
                        <td class="center">${idx + 1}</td>
                        <td>${item.name || 'Item'}</td>
                        <td class="center">${fmtQty(qty)}</td>
                        <td class="right">${fmtMoney(rate > 0 ? rate : amount / qty)}</td>
                        <td class="right">${fmtMoney(amount)}</td>
                    </tr>`;
                });
            }
            
            let totalQty = items.reduce((sum, item) => sum + Number(item.qty || 1), 0);
            if (items.length > 0) {
                itemsHtml += `
                <tr>
                   <td></td>
                   <td style="font-weight:700;">Total</td>
                   <td class="center" style="font-weight:700;">${fmtQty(totalQty)}</td>
                   <td></td>
                   <td class="right" style="font-weight:700;">${fmtMoney(grandTotal)}</td>
                </tr>`;
            }

            const wordsTotal = numberToWords(Math.round(grandTotal));

            const html = `
            <div class="scaled-container">
                <div class="inv-page">
                    <div class="inv-doc-title">Order Summary</div>
                    <div class="inv-doc">
                        <div class="inv-header-grid">
                            <div class="inv-shop-info">
                                <div class="inv-shop-name">${data.shop_name || 'Our Shop'}</div>
                                <div class="inv-shop-detail">
                                    ${data.shop_address ? `<div style="margin-bottom:2px;">${data.shop_address}</div>` : ''}
                                    ${data.shop_phone ? `<div>Phone: +91 ${String(data.shop_phone).replace('+91', '').trim()}</div>` : ''}
                                </div>
                            </div>
                            <div class="inv-meta-grid">
                                <div class="inv-bill-to">
                                    <div class="inv-col-label">Bill To:</div>
                                    <div class="inv-col-val">
                                        <div><strong>${data.customer_name || 'Walk-in Customer'}</strong></div>
                                        ${data.customer_phone ? `<div>Contact No: +91 ${String(data.customer_phone).replace('+91', '').trim()}</div>` : ''}
                                        ${data.vehicle_number ? `<div style="margin-top:4px;">Vehicle: ${data.vehicle_number}</div>` : ''}
                                        ${data.odometer_reading ? `<div>Odometer: ${data.odometer_reading} km</div>` : ''}
                                    </div>
                                </div>
                                <div class="inv-invoice-details">
                                    <div class="inv-col-label">Order Details:</div>
                                    <div class="inv-col-val">
                                        <div>No: ${data.id || '—'}</div>
                                        <div>Date: ${fmtDate(data.created_at)}</div>
                                        <div style="margin-top:6px;font-weight:700;color:${displayStatus === 'PAID' ? '#16a34a' : '#ea580c'}">${displayStatus}</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <table class="inv-table">
                            <thead>
                                <tr>
                                    <th class="center" style="width:5%">#</th>
                                    <th style="width:45%">Item Name</th>
                                    <th class="center" style="width:10%">Quantity</th>
                                    <th class="right" style="width:20%">Price/ Unit (₹)</th>
                                    <th class="right" style="width:20%">Amount(₹)</th>
                                </tr>
                            </thead>
                            <tbody>${itemsHtml}</tbody>

        // GST INVOICE renderer
        // ─────────────────────────────────────────────────────────────────────
        function renderGstInvoice(data, gstMode) {
            document.title = `Tax Invoice #${data.id || '—'} • SnapKhata`;

            const items = Array.isArray(data.items) ? data.items : [];
            const isPaid = data.status === 'PAID';
            const isAutomobile = data.industry === 'automobile';

            const taxableItems = items.filter(i => {
                const t = String(i.type || '').toLowerCase();
                return t !== 'labor' && t !== 'labour' && t !== 'service';
            });
            const nonTaxableItems = items.filter(i => {
                const t = String(i.type || '').toLowerCase();
                return t === 'labor' || t === 'labour' || t === 'service';
            });

            const partsSubtotal = taxableItems.reduce((s, i) => s + Number(i.amount || 0), 0);
            const laborSubtotal = nonTaxableItems.reduce((s, i) => s + Number(i.amount || 0), 0);

            const totalSubtotal = partsSubtotal + laborSubtotal;

            let gstAmt, grandTotal;
            if (gstMode === 'included') {
                gstAmt = totalSubtotal * 18 / 118;
                grandTotal = items.length > 0 ? totalSubtotal : (Number(data.total_amount) || totalSubtotal);
            } else { // excluded
                gstAmt = totalSubtotal * 0.18;
                grandTotal = items.length > 0 ? (totalSubtotal + gstAmt) : (Number(data.total_amount) || (totalSubtotal + gstAmt));
            }

            const receivedAmount = (data.received_amount !== undefined && data.received_amount !== null) ? Number(data.received_amount) : null;
            const balanceDue = receivedAmount !== null ? Math.max(0, grandTotal - receivedAmount) : (data.balance_due !== undefined && data.balance_due !== null ? Number(data.balance_due) : null);

            let displayStatus = data.status || 'UNPAID';
            if (receivedAmount !== null) {
                if (receivedAmount >= grandTotal) displayStatus = 'PAID';
                else if (receivedAmount > 0) displayStatus = 'PARTIAL';
                else displayStatus = 'UNPAID';
            } else if (balanceDue !== null) {
                if (balanceDue <= 0) displayStatus = 'PAID';
                else if (balanceDue < grandTotal) displayStatus = 'PARTIAL';
                else displayStatus = 'UNPAID';
            }
            displayStatus = displayStatus.toUpperCase();

            const taxableValue = gstMode === 'included' ? totalSubtotal - gstAmt : totalSubtotal;

            let itemsHtml = '';

            if (isAutomobile) {
                if (taxableItems.length > 0) {
                    itemsHtml += `<tr style="background:#f8fafc;"><td colspan="6" style="font-weight:700;padding:8px;border-bottom:1px solid var(--border-strong);color:#1e293b;text-transform:uppercase;font-size:12px;letter-spacing:0.5px;">Spare Parts & Consumables Section</td></tr>`;
                    taxableItems.forEach((item, idx) => {
                        const qty = Number(item.qty || 1);
                        const rate = Number(item.rate || 0);
                        const amount = Number(item.amount || 0);
                        const baseAmt = gstMode === 'included' ? amount * 100 / 118 : amount;
                        const baseRate = rate > 0 ? (gstMode === 'included' ? rate * 100 / 118 : rate) : baseAmt / qty;
                        const gstAmountForItem = baseAmt * 0.18;
                        const totalForItem = baseAmt + gstAmountForItem;

                        itemsHtml += `
                        <tr>
                            <td class="center">${idx + 1}</td>
                            <td>${item.name || 'Spare Part'}</td>
                            <td class="center">${fmtQty(qty)}</td>
                            <td class="right">${fmtMoney(baseRate)}</td>
                            <td class="right">${fmtMoney(gstAmountForItem)} (18.0%)</td>
                            <td class="right">${fmtMoney(totalForItem)}</td>
                        </tr>`;
                    });
                }

                if (nonTaxableItems.length > 0) {
                    itemsHtml += `<tr style="background:#f8fafc;"><td colspan="6" style="font-weight:700;padding:8px;border-bottom:1px solid var(--border-strong);color:#1e293b;text-transform:uppercase;font-size:12px;letter-spacing:0.5px;">Labor & Services Section</td></tr>`;
                    nonTaxableItems.forEach((item, idx) => {
                        const qty = Number(item.qty || 1);
                        const rate = Number(item.rate || 0);
                        const amount = Number(item.amount || 0);
                        const baseAmt = gstMode === 'included' ? amount * 100 / 118 : amount;
                        const baseRate = rate > 0 ? (gstMode === 'included' ? rate * 100 / 118 : rate) : baseAmt / qty;
                        const gstAmountForItem = baseAmt * 0.18;
                        const totalForItem = baseAmt + gstAmountForItem;
                        
                        itemsHtml += `
                        <tr>
                            <td class="center">${taxableItems.length + idx + 1}</td>
                            <td>${item.name || 'Servicing'}</td>
                            <td class="center">${fmtQty(qty)}</td>

                            <td class="right">${fmtMoney(gstAmountForItem)} (18.0%)</td>

                        <td class="right">${fmtMoney(totalForItem)}</td>

                        <div class="inv-summary-grid">

                                <!-- split empty left side under totals -->
                                ${isAutomobile && partsSubtotal > 0 ? `<div style="margin-bottom:2px;"><span style="font-weight:600;color:#1e293b;">Spare Parts:</span> ${fmtMoney(partsSubtotal)}</div>` : ''}
                                ${isAutomobile && laborSubtotal > 0 ? `<div><span style="font-weight:600;color:#1e293b;">Servicing:</span> ${fmtMoney(laborSubtotal)}</div>` : ''}
                            </div>
                            <div class="inv-totals-wrap">
