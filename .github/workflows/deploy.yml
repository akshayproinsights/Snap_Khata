name: Deploy App to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~/Snap_Khata
            git pull origin main

            # Update .env file with secrets from GitHub
            if [ -f backend/.env ]; then
              sed -i "s/\${GOOGLE_API_KEY}/${{ secrets.GOOGLE_API_KEY }}/g" backend/.env
            fi

            # ── 1. Python Backend ──────────────────────────────────────────────
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt
            cd ..

            # ── 2. Flutter Web App (Mobile companion) ──────────────────────────
            cd mobile
            flutter build web --release
            cd ..

            # ── 3. React Web App (mydigientry.com) ────────────────────────────
            cd frontend
            npm install
            npm run build
            cd ..

            # Ensure 'serve' is available globally for PM2
            which serve || npm install -g serve

            # ── 4. Nginx Setup (idempotent — safe to run every deploy) ────────
            # Install Nginx if not present
            which nginx || (apt-get update -qq && apt-get install -y -qq nginx)

            # Link our config if not already linked
            CONF_SRC="$HOME/Snap_Khata/nginx/mydigientry.conf"
            CONF_DST="/etc/nginx/sites-enabled/mydigientry.conf"
            if [ ! -f "$CONF_DST" ]; then
              cp "$CONF_SRC" "$CONF_DST"
              # Disable default site to avoid conflicts
              rm -f /etc/nginx/sites-enabled/default
            fi

            # Test config then reload
            nginx -t && systemctl reload nginx

            # ── 5. Restart all PM2 Services ───────────────────────────────────
            pm2 restart ecosystem.config.js --update-env
            pm2 save
