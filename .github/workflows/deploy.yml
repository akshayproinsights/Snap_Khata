name: Deploy SnapKhata to Contabo

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ─── BUILD REACT FRONTEND ───
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # ─── BUILD FLUTTER PWA ───
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Flutter Web
        run: |
          cd mobile
          flutter pub get
          flutter build web --release --no-tree-shake-icons

      # ─── DEPLOY TO CONTABO ───
      - name: Deploy to Server via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/**,frontend/dist/**,mobile/build/web/**,ecosystem.config.js,package.json"
          target: "/root/Snap_Khata_Temp"
          strip_components: 0

      - name: Finalize Deployment on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Sync files to the main directory
            rsync -avz /root/Snap_Khata_Temp/ /root/Snap_Khata/
            rm -rf /root/Snap_Khata_Temp
            
            cd /root/Snap_Khata
            
            # 2. Setup Backend VirtualEnv & Dependencies
            cd backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -r requirements.txt
            cd ..
            
            # 3. Restart Services with PM2
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save
            
            echo "Deployment Successful!"
