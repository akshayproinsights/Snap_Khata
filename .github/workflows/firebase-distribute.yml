name: 🚀 Build & Distribute Mobile App
# NOTE: This workflow ONLY builds the Flutter mobile APK.
# The backend runs on Hetzner and is NOT deployed here.

on:
  push:
    branches:
      - stable
      - main
  workflow_dispatch:          # Allow manual trigger from GitHub UI
    inputs:
      release_notes:
        description: 'Custom release notes (optional)'
        required: false
        default: ''

env:

  JAVA_VERSION: '17'
  WORKING_DIR: mobile
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 for all JS actions

jobs:
  build-and-distribute:
    name: Build APK & Send to Firebase
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history for accurate commit messages

      # ── 2. Java Setup ──────────────────────────────────────────────────────
      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      # ── 3. Flutter Setup ───────────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-stable

      # ── 4. Cache Gradle ────────────────────────────────────────────────────
      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      # ── 5. Accept Android Licenses ─────────────────────────────────────────
      - name: ✅ Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 6. Install Flutter Dependencies ────────────────────────────────────
      - name: 📚 Install Flutter dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: flutter pub get

      # ── 7. Write google-services.json (from secret if available) ───────────
      #       Falls back to the committed file if secret is not set.
      #       NOTE: `secrets` cannot be used in `if:` expressions on GitHub Actions,
      #       so we pass it into an env var and check that instead.
      - name: 🔑 Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        working-directory: ${{ env.WORKING_DIR }}/android/app
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "Writing google-services.json from secret..."
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
          else
            echo "No GOOGLE_SERVICES_JSON secret found — using committed google-services.json"
          fi

      # ── 8. Build Release APK ───────────────────────────────────────────────
      - name: 🔨 Build release APK
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name="1.0.${{ github.run_number }}"

      # ── 9. Rename APK with version info ───────────────────────────────────
      - name: 📝 Rename APK
        run: |
          mv \
            ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/app-release.apk \
            ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/SnapKhata-v1.0.${{ github.run_number }}.apk

      # ── 10. Compose Release Notes ──────────────────────────────────────────
      - name: 📋 Compose release notes
        id: notes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          BUILD_NUM="${{ github.run_number }}"
          MANUAL_NOTES="${{ github.event.inputs.release_notes }}"

          if [ -n "$MANUAL_NOTES" ]; then
            NOTES="$MANUAL_NOTES"
          else
            NOTES="Build #$BUILD_NUM — $COMMIT_MSG ($COMMIT_SHA)"
          fi

          echo "notes=$NOTES" >> $GITHUB_OUTPUT
          echo "Release notes: $NOTES"

      - name: 🚀 Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ github.ref_name == 'stable' && 'snapkhata_users' || 'internal-development' }}
          releaseNotes: ${{ steps.notes.outputs.notes }}
          file: ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/SnapKhata-v1.0.${{ github.run_number }}.apk

      # ── 12. Upload APK as GitHub Artifact (backup) ─────────────────────────
      - name: 💾 Save APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapKhata-v1.0.${{ github.run_number }}
          path: ${{ env.WORKING_DIR }}/build/app/outputs/flutter-apk/SnapKhata-v1.0.${{ github.run_number }}.apk
          retention-days: 30

      # ── 13. Summary ────────────────────────────────────────────────────────
      - name: 📊 Write job summary
        if: always()
        run: |
          DIST_GROUP="${{ github.ref_name == 'stable' && 'snapkhata_users' || 'internal-development' }}"
          echo "## 🚀 SnapKhata Build for $DIST_GROUP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | 1.0.${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Notes | ${{ steps.notes.outputs.notes }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ APK distributed to **$DIST_GROUP** group via Firebase App Distribution." >> $GITHUB_STEP_SUMMARY