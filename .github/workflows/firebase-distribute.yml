name: Build and Send APK to Firebase

on:
  push:
    branches:
      - main  # <-- CHANGE THIS to 'master' if that's your branch name

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile # Tells the robot to look in your mobile folder

      - name: Build APK
        run: flutter build apk --release
        working-directory: mobile

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: mobile/build/app/outputs/flutter-apk/app-release.apk