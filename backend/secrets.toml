# Local development secrets
# DO NOT COMMIT THIS FILE TO GIT

# Google Gemini API Key (MUST be at root level, before any sections)
google_api_key = "your_google_api_key_here"

[users]

[users.adnak-test]
password = "1234"
r2_bucket = "digientry-local-dev"
# Local development user - use this for testing

[users.Adnak]
password = "Adnak123"
r2_bucket = "adnak-sir-invoices"
# Production User

[supabase]

[supabase.development]
# DEV DATABASE
url = "your_supabase_dev_url"
anon_key = "your_supabase_dev_anon_key"
service_role_key = "your_supabase_dev_service_role_key"

[supabase.production]
# PROD DATABASE (Fetched from root secrets.toml)
url = "your_supabase_prod_url"
anon_key = "your_supabase_prod_anon_key"
service_role_key = "your_supabase_prod_service_role_key"

[cloudflare_r2]

[cloudflare_r2.development]
account_id = "your_r2_dev_account_id"
endpoint_url = "your_r2_dev_endpoint_url"
access_key_id = "your_r2_dev_access_key_id"
secret_access_key = "your_r2_dev_secret_access_key"
public_base_url = "your_r2_dev_public_base_url"

[cloudflare_r2.production]
account_id = "your_r2_prod_account_id"
endpoint_url = "your_r2_prod_endpoint_url"
access_key_id = "your_r2_prod_access_key_id"
secret_access_key = "your_r2_prod_secret_access_key"
public_base_url = "your_r2_prod_public_base_url"
